server:
  port: 8080

spring:
  application:
    name: guanxing-wenyi-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/guanxing_wenyi?stringtype=unspecified}
    username: ${SPRING_DATASOURCE_USERNAME:gxwy}
    password: ${SPRING_DATASOURCE_PASSWORD:gxwy_dev_pwd}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 自定义配置
gxwy:
  ai:
    provider: ${GXWY_AI_PROVIDER:mock}      # mock | llm（llm=走真实模型，失败自动回退 mock）
    client: ${GXWY_AI_CLIENT:doubao}        # doubao | deepseek(预留)，provider=llm 时生效
    timeout-ms: ${GXWY_AI_TIMEOUT_MS:6000}  # 模型调用读超时（前端整体超时 8s，须留出回退余量）
    doubao:
      base-url: ${DOUBAO_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      api-key: ${DOUBAO_API_KEY:}           # 只从环境变量读，不落配置文件
      model: ${DOUBAO_MODEL:doubao-seed-1-6-250615}   # 也可填推理接入点 ep-xxx
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-chat}
  voice:
    provider: ${GXWY_VOICE_PROVIDER:mock}   # mock | whisper(预留)
  cors:
    allowed-origins: ${GXWY_CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.guanxing.wenyi: INFO
